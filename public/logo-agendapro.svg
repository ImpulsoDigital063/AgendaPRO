<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">

  <!-- Ícone: quadrado arredondado azul (inspiração Facebook) -->
  <rect x="0" y="8" width="54" height="54" rx="13" fill="#1877F2"/>

  <!-- Letra A branca dentro do ícone -->
  <text
    x="27"
    y="46"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="29"
    fill="white"
    text-anchor="middle"
  >A</text>

  <!-- "Agenda" em cinza escuro -->
  <text
    x="66"
    y="41"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="700"
    font-size="26"
    fill="#111827"
  >Agenda</text>

  <!-- "PRO" em azul, mesmo baseline -->
  <text
    x="168"
    y="41"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="26"
    fill="#1877F2"
  >PRO</text>

  <!-- "by Impulso Digital" — discreto, menor -->
  <text
    x="67"
    y="58"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="11"
    fill="#9CA3AF"
    letter-spacing="0.3"
  >by Impulso Digital</text>

</svg>
